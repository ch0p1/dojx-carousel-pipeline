<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
  }

  /* Franja lateral roja, marca de identidad */
  .accent-bar {
    position: absolute;
    left: 0; top: 0;
    width: 14px;
    height: 100%;
    background: #E63946;
  }

  .container {
    padding: 90px 80px 100px 100px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .top-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 24px;
    color: #E63946;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .slide-count {
    color: #666;
    font-size: 22px;
    font-weight: 600;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 40px;
  }

  .title {
    font-family: 'Anton', sans-serif;
    font-size: 92px;
    line-height: 1.02;
    text-transform: uppercase;
    color: #FFFFFF;
    letter-spacing: 1px;
  }

  .body {
    font-size: 34px;
    line-height: 1.45;
    color: #D9D9D9;
    font-weight: 400;
    max-width: 850px;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 2px solid #262626;
    padding-top: 30px;
  }

  .logo {
    font-family: 'Anton', sans-serif;
    font-size: 32px;
    color: #FFFFFF;
    letter-spacing: 1px;
  }
  .logo span { color: #E63946; }

  .handle {
    font-size: 22px;
    color: #666;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="container">
    <div class="top-meta">
      <span>{{PILLAR}}</span>
      <span class="slide-count">{{SLIDE_NUM}} / {{TOTAL}}</span>
    </div>

    <div class="content">
      <div class="title">{{TITLE}}</div>
      <div class="body">{{BODY}}</div>
    </div>

    <div class="footer">
      <div class="logo">DOJ<span>X</span></div>
      <div class="handle">@dojx</div>
    </div>
  </div>
</body>
</html>
