<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    background: {{BG_COLOR}}; /* rojo #C41E1E o azul #1E2FE6, alternar por variedad */
    font-family: 'Poppins', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .frame {
    padding: 70px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    font-weight: 800;
    text-transform: uppercase;
    color: #FFFFFF;
  }

  .headline-block {
    margin-top: 40px;
  }

  .headline {
    font-size: 74px;
    font-weight: 900;
    line-height: 1.05;
    color: #000000;
  }

  .subline {
    margin-top: 20px;
    font-size: 44px;
    font-weight: 800;
    line-height: 1.15;
    color: #FFFFFF;
    text-align: right;
  }

  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .follow-cta {
    font-size: 26px;
    font-weight: 800;
    color: #FFFFFF;
    text-align: left;
    line-height: 1.3;
  }

  .handle {
    font-size: 40px;
    font-weight: 900;
    color: #000000;
  }

  .logo-mark {
    position: absolute;
    bottom: 40px;
    right: 40px;
    width: 34px;
    height: 34px;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="top-bar">
      <span>@DOJX</span>
      <span>{{PILLAR_LABEL}}</span>
    </div>
    <div class="headline-block">
      <div class="headline">{{HEADLINE}}</div>
      <div class="subline">{{SUBLINE}}</div>
    </div>
    <div class="bottom-row">
      <div class="follow-cta">{{FOLLOW_TEXT}}</div>
      <div class="handle">@DOJX</div>
    </div>
  </div>
  <svg class="logo-mark" viewBox="0 0 24 24" fill="#FFFFFF">
    <path d="M13 2 L4 14 H10 L9 22 L20 9 H13 Z"/>
  </svg>
</body>
</html>
