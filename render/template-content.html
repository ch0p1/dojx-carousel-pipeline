<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,800;0,900;1,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    font-family: 'Poppins', sans-serif;
    position: relative;
    overflow: hidden;
    /* {{BG_STYLE}} se reemplaza en render.js:
       - fondo sólido: background: #C41E1E;
       - fondo con imagen: background: url('...') center/cover; */
    {{BG_STYLE}}
  }

  /* Overlay oscuro sutil, SOLO se activa si es fondo de foto (clase .has-photo) */
  .scrim {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.35) 100%);
    display: none;
  }
  body.has-photo .scrim { display: block; }

  .frame {
    position: relative;
    z-index: 1;
    padding: 70px 70px 90px 70px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .content {
    display: flex;
    flex-direction: column;
    gap: 28px;
    margin-top: 60px;
  }

  .title {
    font-size: 76px;
    font-weight: 900;
    line-height: 1.05;
    text-transform: {{TITLE_CASE}}; /* "none" o "uppercase" según la pieza */
  }

  .title .accent {
    color: {{ACCENT_COLOR}};
  }

  .body-text {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.4;
    max-width: 880px;
  }

  .footer-block {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.45;
    text-align: {{FOOTER_ALIGN}};
  }
  .footer-block .accent { color: {{ACCENT_COLOR}}; }

  .logo-mark {
    position: absolute;
    bottom: 40px;
    right: 40px;
    z-index: 2;
    width: 34px;
    height: 34px;
  }
</style>
</head>
<body class="{{BODY_CLASS}}">
  <div class="scrim"></div>
  <div class="frame">
    <div class="top-bar">
      <span>@DOJX</span>
      <span>{{PILLAR_LABEL}}</span>
    </div>
    <div class="content">
      <div class="title">{{TITLE}}</div>
      <div class="body-text">{{BODY}}</div>
    </div>
    <div class="footer-block">{{FOOTER}}</div>
  </div>
  <!-- Logo simplificado tipo rayo, aproximando el isotipo DOJX -->
  <svg class="logo-mark" viewBox="0 0 24 24" fill="{{LOGO_COLOR}}">
    <path d="M13 2 L4 14 H10 L9 22 L20 9 H13 Z"/>
  </svg>
</body>
</html>
